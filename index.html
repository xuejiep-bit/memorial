<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思念之光 - 现代祭奠</title>
    <style>
        :root {
            --bg: #030305;
            --gold: #d4af37;
            --text-dim: #888;
            --fire-core: #ff4d00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at 50% 85%, #121218 0%, #030305 80%);
        }

        /* 顶部引导 */
        .intro-header {
            margin-top: 5vh;
            text-align: center;
            z-index: 10;
            transition: opacity 1s;
        }
        h1 { font-weight: 200; letter-spacing: 8px; color: var(--gold); margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 3px; }

        /* 3x3 九宫格 */
        .selection-panel {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            padding: 10px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #222;
            padding: 18px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .item-card:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.04); }
        .item-card.selected { 
            border-color: var(--gold); 
            background: rgba(212, 175, 55, 0.12);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
            transform: scale(1.02);
        }
        
        .item-card svg, .item-card .food-icon { width: 42px; height: 42px; margin-bottom: 12px; }
        .food-icon { font-size: 32px; line-height: 42px; }
        .item-card span { display: block; font-size: 0.85rem; color: #bbb; }

        /* 底部操作区 */
        .action-area { margin-top: 30px; z-index: 10; text-align: center; }
        .start-btn {
            padding: 14px 70px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 1rem;
            letter-spacing: 5px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.6s;
            opacity: 0.3;
            pointer-events: none;
        }
        .start-btn.active { opacity: 1; pointer-events: all; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2); }
        .start-btn:hover { background: var(--gold); color: #000; }

        #mainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .interaction-overlay {
            position: absolute;
            bottom: 8vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 2s;
            pointer-events: none;
            z-index: 100;
        }
        .interaction-overlay.show { opacity: 1; pointer-events: all; }

        .timer-info { color: var(--gold); font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 3px; }
        
        /* 核心修改：改为 textarea 且取消限制 */
        .msg-box {
            width: 85%;
            max-width: 500px;
            height: 100px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            padding: 15px;
            outline: none;
            resize: none;
            transition: all 0.8s;
            line-height: 1.6;
        }
        .msg-box:focus { border-color: var(--gold); background: rgba(255, 255, 255, 0.08); }

        /* 修改：留言漂浮支持换行 */
        .floating-message {
            position: absolute;
            color: #fff;
            width: 80%;
            max-width: 600px;
            text-align: center;
            pointer-events: none;
            font-size: 1.2rem;
            line-height: 1.8;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            z-index: 50;
            font-weight: 300;
            white-space: pre-wrap; /* 保持换行 */
            word-wrap: break-word; /* 自动断行 */
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <canvas id="mainCanvas"></canvas>

        <div class="intro-header" id="header">
            <h1>心灯寄思</h1>
            <div class="subtitle">请选择祭品（多选）</div>
        </div>

        <div class="selection-panel" id="itemPanel">
            <div class="item-card" data-name="冥币">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="16" width="48" height="32" rx="2" stroke="#d4af37" stroke-width="2.5"/>
                    <circle cx="32" cy="32" r="9" stroke="#d4af37" stroke-width="2"/>
                    <path d="M14 24H22M42 24H50M14 40H22M42 40H50" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span>冥币</span>
            </div>
            <div class="item-card" data-name="金元宝">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 42C10 42 8 30 32 30C56 30 54 42 54 42C54 48 46 54 32 54C18 54 10 48 10 42Z" fill="#d4af37" fill-opacity="0.7" stroke="#d4af37" stroke-width="2"/>
                    <path d="M22 30C22 20 42 20 42 30" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <span>金元宝</span>
            </div>
            <div class="item-card" data-name="金条">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 48L18 20H46L52 48H12Z" fill="#d4af37" fill-opacity="0.8" stroke="#d4af37" stroke-width="2"/>
                    <path d="M22 28H42M24 36H40" stroke="#000" stroke-opacity="0.2" stroke-width="2"/>
                </svg>
                <span>金条</span>
            </div>
            <div class="item-card" data-name="烤乳猪"><div class="food-icon">🐖</div><span>烤乳猪</span></div>
            <div class="item-card" data-name="脆皮烧肉"><div class="food-icon">🥓</div><span>脆皮烧肉</span></div>
            <div class="item-card" data-name="烤羊排"><div class="food-icon">🍖</div><span>烤羊排</span></div>
            <div class="item-card" data-name="煎牛排"><div class="food-icon">🥩</div><span>煎牛排</span></div>
            <div class="item-card" data-name="炖排骨"><div class="food-icon">🥘</div><span>炖排骨</span></div>
            <div class="item-card" data-name="手工饺子"><div class="food-icon">🥟</div><span>手工饺子</span></div>
        </div>

        <div class="action-area">
            <button class="start-btn" id="startBtn">开启祭奠</button>
        </div>

        <div class="interaction-overlay" id="interactionUI">
            <div class="timer-info" id="timer">1:00</div>
            <!-- 修改点：使用 textarea 并移除字数限制 -->
            <textarea class="msg-box" id="userMsg" placeholder="在这安静的一分钟里，写下你想对亲人说的话..."></textarea>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const itemCards = document.querySelectorAll('.item-card');
        const startBtn = document.getElementById('startBtn');
        let selectedItems = new Set();
        let particles = [];
        let ash = [];
        let isRunning = false;
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        itemCards.forEach(card => {
            card.addEventListener('click', () => {
                const name = card.dataset.name;
                if (selectedItems.has(name)) {
                    selectedItems.delete(name);
                    card.classList.remove('selected');
                } else {
                    selectedItems.add(name);
                    card.classList.add('selected');
                }
                startBtn.classList.toggle('active', selectedItems.size > 0);
            });
        });

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = w / 2 + (Math.random() - 0.5) * 110;
                this.y = h * 0.82;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = this.type === 'fire' ? -(Math.random() * 4 + 3.5) : -(Math.random() * 2 + 1.8);
                this.life = Math.random() * 40 + 35;
                this.maxLife = this.life;
                this.size = this.type === 'fire' ? Math.random() * 35 + 20 : Math.random() * 4 + 1.5;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.alpha = this.life / this.maxLife;
                if (this.type === 'ash') this.vx += Math.sin(this.y / 60) * 0.15;
                if (this.life <= 0 && isRunning) this.reset();
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'fire') {
                    ctx.globalCompositeOperation = 'lighter';
                    let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                    grad.addColorStop(0, `rgba(255, 90, 0, ${this.alpha * 0.8})`);
                    grad.addColorStop(1, 'rgba(255, 20, 0, 0)');
                    ctx.fillStyle = grad;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = `rgba(180, 180, 180, ${this.alpha * 0.5})`;
                }
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            if (isRunning || (particles.length + ash.length) > 0) {
                particles.forEach((p, i) => { 
                    p.update(); p.draw(); 
                    if(!isRunning && p.life <= 0) particles.splice(i, 1);
                });
                ash.forEach((a, i) => { 
                    a.update(); a.draw(); 
                    if(!isRunning && a.life <= 0) ash.splice(i, 1);
                });
            }
            requestAnimationFrame(animate);
        }
        animate();

        startBtn.onclick = () => {
            document.getElementById('header').style.opacity = '0';
            document.getElementById('itemPanel').classList.add('hidden');
            startBtn.classList.add('hidden');
            document.getElementById('interactionUI').classList.add('show');
            
            isRunning = true;
            particles = Array.from({ length: 160 }, () => new Particle('fire'));
            ash = Array.from({ length: 110 }, () => new Particle('ash'));

            let seconds = 60;
            const timerEl = document.getElementById('timer');
            const countdown = setInterval(() => {
                seconds--;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0' + s : s}`;
                
                if (seconds <= 0) {
                    clearInterval(countdown);
                    finish();
                }
            }, 1000);
        };

        function finish() {
            const msg = document.getElementById('userMsg').value;
            isRunning = false; 
            document.getElementById('interactionUI').classList.remove('show');

            if (msg.trim() !== "") {
                const el = document.createElement('div');
                el.className = 'floating-message';
                el.innerText = msg;
                el.style.left = '50%';
                el.style.bottom = '25%';
                el.style.transform = 'translateX(-50%)';
                document.body.appendChild(el);

                el.animate([
                    { bottom: '25%', opacity: 1, filter: 'blur(0px)' },
                    { bottom: '85%', opacity: 0, filter: 'blur(8px)' }
                ], {
                    duration: 12000,
                    easing: 'ease-out',
                    fill: 'forwards'
                }).onfinish = () => el.remove();
            }

            setTimeout(() => { location.reload(); }, 15000);
        }
    </script>
</body>
</html>
